version: "3.8"

services:
  # === API DE RECEBIMENTO (WEBHOOKS) ===
  exagerado-app:
    build: .
    container_name: exagerado_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - evolution-postgres
      - redis
    environment:
      - PYTHONPATH=/app
    networks:
      - evolution-net

  # === WORKER (PROCESSAMENTO / JOBS) ===
  exagerado-worker:
    build: .
    container_name: exagerado_worker
    restart: always
    env_file:
      - .env
    command: python app/main_stats.py
    depends_on:
      - evolution-postgres
      - redis
    environment:
      - PYTHONPATH=/app
      - TZ=America/Sao_Paulo
    networks:
      - evolution-net

  # === EVOLUTION API ===
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - redis
      - evolution-postgres
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net

    # 🔒 SEM HARDCODE — tudo via .env
    environment:
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI}

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution

  # === REDIS ===
  redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net

  # === POSTGRES ===
  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net

volumes:
  evolution_instances:
  evolution_redis:
  postgres_data:

networks:
  evolution-net:
    driver: bridge